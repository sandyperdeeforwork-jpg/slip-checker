<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตรวจสลิป</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-3">📄 ตรวจสอบสลิปโอนเงิน</h3>

    <input class="form-control mb-3" type="file" id="file">

    <button class="btn btn-primary w-100" onclick="upload()">ตรวจสอบ</button>

    <div id="resultBox" class="mt-4 d-none">
      <h5>ผลลัพธ์</h5>
      <div id="result" class="alert"></div>
    </div>
  </div>
</div>

<script>
function upload() {
    let file = document.getElementById("file").files[0]

    if (!file) {
        alert("กรุณาเลือกไฟล์ก่อน")
        return
    }

    let formData = new FormData()
    formData.append("file", file)

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        console.log("DATA:", data)

        let box = document.getElementById("resultBox")
        let result = document.getElementById("result")

        box.classList.remove("d-none")

        let d = data.data || {}

        // ✅ ผ่าน
        if (data.status === "ok") {

            result.className = "alert alert-success"
            result.innerHTML = `
                ✔ สำเร็จ<br><br>

                💰 จำนวนเงิน: ${d.amount} บาท<br>

                👤 ผู้โอน: ${d.sender_name}<br>
                🔢 เลขบัญชี: ${d.sender_account}<br><br>

                🏢 ผู้รับ: ${d.receiver_name}<br>
                🔢 เลขบัญชี: ${d.receiver_account}<br><br>

                🕒 เวลา: ${d.date}<br>
                ⏱️ โอนมาแล้ว: ${d.time_passed}
            `
        }

        // ⚠️ ซ้ำ
        else if (data.status === "duplicate") {

            result.className = "alert alert-warning"
            result.innerHTML = `
                ⚠️ สลิปนี้เคยถูกใช้แล้ว<br><br>

                💰 จำนวนเงิน: ${d.amount} บาท<br>

                👤 ผู้โอน: ${d.sender_name}<br>
                🔢 เลขบัญชี: ${d.sender_account}<br><br>

                🏢 ผู้รับ: ${d.receiver_name}<br>
                🔢 เลขบัญชี: ${d.receiver_account}<br><br>

                🕒 เวลา: ${d.date}<br>
                ⏱️ โอนมาแล้ว: ${d.time_passed}
            `
        }

        // ❌ ไม่ผ่าน
        else {
            result.className = "alert alert-danger"
            result.innerText = "❌ ตรวจสอบไม่ผ่าน"
        }

    })
    .catch(err => {
        console.error("ERROR:", err)

        let box = document.getElementById("resultBox")
        let result = document.getElementById("result")

        box.classList.remove("d-none")
        result.className = "alert alert-danger"
        result.innerText = "❌ ระบบ error (ดู console)"
    })
}
</script>
